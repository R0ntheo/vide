description: Montant dépensé (réservations validées) rapporté au montant initial du crédit, observé à l'expiration du crédit
  18-20 ans.
display_name: Taux d'utilisation du crédit à expiration
domain_path: core/beneficiaires
expression: SAFE_DIVIDE(SUM(total_actual_amount_spent), SUM(total_deposit_amount))
name: taux_utilisation_credit
notes: Réservations sur l'ensemble des crédits octroyés (15-20 ans). Agrégé par date d'expiration du crédit 18-20 ans. Disponible
  pré-agrégé dans external_reporting_deposit_usage (kpi_name = 'taux_utilisation_a_expiration_du_credit').
precomputed_in: external_reporting_individual
synonyms:
- utilisation du crédit
- taux de consommation
- deposit usage rate
table_name: global_user_beneficiary
table_schema: analytics_prod
unit: '%'
