description: Nombre de bénéficiaires uniques ayant ouvert l'application au moins une fois dans le mois. Calculé sur firebase_visits
  en filtrant first_event_date sur le mois.
display_name: Bénéficiaires actifs mensuels (MAU)
domain_path: core/beneficiaires
expression: COUNT(DISTINCT user_id)
name: mau_beneficiaires
notes: Pour segmentation rural/urbain, joindre firebase_visits.user_id sur global_user_beneficiary.user_id et utiliser user_macro_density_label.
synonyms:
- MAU
- utilisateurs mensuels
- monthly active users
table_name: firebase_visits
table_schema: analytics_prod
unit: bénéficiaires
