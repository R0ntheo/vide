  source: manual
- data_type: number
  description: Nombre de jours entre la création du compte utilisateur et la création du crédit.
  name: days_between_user_creation_and_deposit_creation
  ordinal: 41
  source: manual
description: Vue détaillée des crédits culturels (dépôts financiers) alloués aux bénéficiaires, incluant les informations
  du bénéficiaire et les métriques de consommation.
