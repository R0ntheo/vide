  description: Montant théorique total dépensé sur ce crédit.
  name: total_theoretical_amount_spent
  ordinal: 32
  source: manual
  unit: €
- data_type: number
  description: Montant réel total dépensé sur ce crédit, reflétant les transactions effectives.
  name: total_actual_amount_spent
  ordinal: 33
  source: manual
  unit: €
- data_type: number
  description: Montant théorique total dépensé en biens numériques sur ce crédit.
  name: total_theoretical_amount_spent_in_digital_goods
  ordinal: 34
  source: manual
  unit: €
- data_type: number
  description: Nombre total de réservations individuelles non annulées sur ce crédit.
  name: total_non_cancelled_individual_bookings
