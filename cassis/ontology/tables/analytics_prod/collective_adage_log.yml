  name: geoloc_radius_filter
  ordinal: 41
description: Logs de navigation et d'interaction sur la plateforme Adage — recherches, consultations, clics, réservations
  par les enseignants.
domain_path: core/eac/adage
grain:
- Une ligne par combinaison (event_date, event_name, event_timestamp, user_id)
schema_name: analytics_prod
synonyms:
- log Adage
- journal Adage
table_name: collective_adage_log
