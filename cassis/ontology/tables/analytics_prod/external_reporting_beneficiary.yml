columns:
- data_type: date
  description: Premier jour du mois auquel se rapporte le KPI.
  name: partition_month
  ordinal: 0
- data_type: datetime
  description: Date effective d'exécution du rafraîchissement des données.
  name: updated_at
  ordinal: 1
- data_type: string
  description: Agrégation géographique du KPI (National, Régional ou Départemental).
  name: dimension_name
  ordinal: 2
- data_type: string
  description: Nom de l'agrégation géographique du KPI, si elle existe (nom de région, nom de département).
  name: dimension_value
  ordinal: 3
- data_type: string
  description: |-
    Valeurs possibles de kpi_name :
    - beneficiaire_actuel — nombre de bénéficiaires actuels (crédit non expiré, non épuisé)
    - beneficiaire_total — nombre cumulé de bénéficiaires depuis 2019
    - pct_beneficiaire_actuel_qpv — % bénéficiaires actuels résidant en QPV
    - pct_beneficiaire_actuel_rural — % bénéficiaires actuels en zone rurale
    - pct_beneficiaire_actuel_non_scolarise — % bénéficiaires actuels non scolarisés
    - beneficiaire_actuel_homme / beneficiaire_actuel_femme / beneficiaire_actuel_sans_genre — ventilation par genre
    - pct_beneficiaire_actuel_{activité} — % par activité déclarée, où {activité} ∈ {apprenti, chomeur, volontaire, alternant, employe, etudiant, lyceen, collegien, inactif}
  name: kpi_name
  ordinal: 4
- data_type: number
  description: Numérateur du KPI calculé.
  name: numerator
  ordinal: 5
- data_type: number
  description: Dénominateur du KPI calculé.
  name: denominator
  ordinal: 6
- data_type: number
  description: Valeur du KPI, égale au numérateur divisé par le dénominateur.
  name: kpi
  ordinal: 7
description: KPIs bénéficiaires au format pivot — inscriptions, activations, profils démographiques par dimension géographique.
domain_path: reporting/institutionnel/individuel
grain:
- Une ligne par mois × dimension × KPI (partition_month, dimension_name, kpi_name)
schema_name: analytics_prod
synonyms:
- KPI bénéficiaires
- reporting individuel bénéficiaires
table_name: external_reporting_beneficiary
