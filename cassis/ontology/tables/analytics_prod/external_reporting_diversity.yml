columns:
- data_type: date
  description: Premier jour du mois auquel le KPI se rapporte.
  name: partition_month
  ordinal: 0
- data_type: datetime
  description: Date effective de rafraîchissement des données.
  name: updated_at
  ordinal: 1
- data_type: string
  description: 'Agrégation géographique du KPI : nationale, régionale ou départementale.'
  name: dimension_name
  ordinal: 2
- data_type: string
  description: Nom de l'agrégation géographique du KPI si elle existe (nom de région, nom de département).
  name: dimension_value
  ordinal: 3
- data_type: string
  description: |-
    Valeurs possibles de kpi_name :
    - pct_beneficiaires_ayant_reserve_dans_la_categorie_{catégorie} — % de bénéficiaires ayant réservé dans une catégorie donnée, où {catégorie} ∈ {livre, cinema, concert, spectacle_vivant, musee, pratique_artistique, instrument, beaux_arts, cartes_jeunes, conference, film, jeu, musique_enregistree, media, technique}
    - pct_beneficiaires_ayant_reserve_dans_3_categories — % de bénéficiaires ayant réservé dans au moins 3 catégories
  name: kpi_name
  ordinal: 4
- data_type: number
  description: Numérateur du KPI calculé.
  name: numerator
  ordinal: 5
- data_type: number
  description: Dénominateur du KPI calculé.
  name: denominator
  ordinal: 6
- data_type: number
  description: Valeur du KPI, égale au numérateur divisé par le dénominateur.
  name: kpi
  ordinal: 7
description: KPIs diversité culturelle au format pivot — score de diversité, répartition par catégorie par dimension géographique.
domain_path: reporting/institutionnel/individuel
grain:
- Une ligne par mois × dimension × KPI (partition_month, dimension_name, kpi_name)
schema_name: analytics_prod
synonyms:
- KPI diversité
- diversité 3 catégories
table_name: external_reporting_diversity
