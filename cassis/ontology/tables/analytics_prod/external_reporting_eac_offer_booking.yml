columns:
- data_type: date
  description: Premier jour du mois auquel se rapporte le KPI.
  name: partition_month
  ordinal: 0
- data_type: datetime
  description: Date effective d'exécution du rafraîchissement des données.
  name: updated_at
  ordinal: 1
- data_type: string
  description: Agrégation géographique du KPI (National, Régional ou Départemental).
  name: dimension_name
  ordinal: 2
- data_type: string
  description: Nom de l'agrégation géographique du KPI, si elle existe (nom de région, nom de département).
  name: dimension_value
  ordinal: 3
- data_type: string
  description: |-
    Valeurs possibles de kpi_name :
    - total_offres_collectives_creees — nombre total d'offres collectives créées
    - total_reservations_collectives — nombre total de réservations collectives
    - total_montant_engage — montant total engagé en réservations collectives
  name: kpi_name
  ordinal: 4
- data_type: number
  description: Numérateur du KPI calculé.
  name: numerator
  ordinal: 5
- data_type: number
  description: Dénominateur du KPI calculé.
  name: denominator
  ordinal: 6
- data_type: number
  description: Valeur du KPI, égale au numérateur divisé par le dénominateur.
  name: kpi
  ordinal: 7
description: KPIs offres et réservations collectives EAC au format pivot — créations, réservations, montants par dimension
  géographique.
domain_path: reporting/institutionnel/eac
grain:
- Une ligne par mois × dimension × KPI (partition_month, dimension_name, kpi_name)
schema_name: analytics_prod
synonyms:
