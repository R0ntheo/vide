  description: Identifiant unique de l'utilisateur.
  name: user_id
  ordinal: 3
- data_type: date
  description: Date à laquelle l'événement s'est produit, utilisée pour le partitionnement des données.
  name: event_date
  ordinal: 4
- data_type: datetime
  description: Horodatage exact de l'enregistrement de l'événement.
  name: event_timestamp
  ordinal: 5
