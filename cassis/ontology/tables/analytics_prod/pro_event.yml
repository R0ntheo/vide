columns:
- data_type: string
  description: Nom de l'événement ; pour les vues d'écran, concatène le nom de l'événement avec le nom d'écran Firebase.
  name: event_name
  ordinal: 0
- data_type: string
  description: Nom de la page sur laquelle l'événement s'est produit.
  name: page_name
  ordinal: 1
- data_type: string
